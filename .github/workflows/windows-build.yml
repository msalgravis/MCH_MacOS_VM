name: Windows Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-vst3:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Build test target
        run: cmake --build build --config Release --target BinauralSpeakerRoomTests

      - name: Run unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BinauralSpeakerRoom-vst3
          path: build/BinauralSpeakerRoom_artefacts/Release/VST3/
